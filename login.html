<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FertilizerSeedMart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--green:#2e7d32;
--light:#f4f8f4;
--accent:#ffb300;
}

*{box-sizing:border-box;margin:0;font-family:Poppins,sans-serif}
body{background:var(--light)}

/* HEADER */
header{
background:var(--green);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
flex-wrap:wrap;
gap:10px;
}

/* BRAND LOGO */
.brand{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
}

.brand img{
height:42px;
border-radius:6px;
background:white;
padding:2px;
}

/* NAV */
nav{
display:flex;
gap:18px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:white;
font-weight:500;
padding:6px 10px;
border-radius:6px;
transition:.25s;
}

nav a:hover{
background:rgba(255,255,255,0.2);
}

/* CENTER AREA */
.center{
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
padding:20px;
}

/* LOGIN CARD */
.card{
background:white;
width:360px;
max-width:95%;
padding:32px;
border-radius:18px;
box-shadow:0 12px 25px rgba(0,0,0,0.15);
text-align:center;
}

.title{
font-size:26px;
font-weight:700;
color:var(--green);
margin-bottom:18px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
transition:.25s;
}

input:focus{
border-color:var(--green);
outline:none;
box-shadow:0 0 0 2px rgba(46,125,50,.15);
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:var(--accent);
font-weight:600;
cursor:pointer;
margin-top:10px;
transition:.25s;
}

button:hover{
background:#ffa000;
transform:translateY(-1px);
}

/* TEXT */
.error{color:red;font-size:14px;margin-top:8px}

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:var(--green);
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="brand">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSB7R-Hvkk2DNO8FEXML4n1gtinFU95JTBSEw&s">
<span>FertilizerSeedMart</span>
</a>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
</nav>
</header>

<div class="center">
<div class="card">

<div class="title">Login</div>

<form>
<input type="email" placeholder="Email Address" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>
<div class="error"></div>
</form>

<div class="link">
Don't have an account? <a href="register.html">Register</a>
</div>

</div>
</div>

</body>
</html>
