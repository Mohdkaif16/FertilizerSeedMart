<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FertilizerSeedMart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--green:#2e7d32;
--light:#f4f8f4;
--accent:#ffb300;
}

*{box-sizing:border-box;margin:0;font-family:Poppins,sans-serif}
body{background:var(--light)}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--green);
color:white;
padding:14px 18px;
}

nav{
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
font-weight:500;
}

/* LOGIN CARD */
.center{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.card{
background:white;
width:360px;
padding:30px;
border-radius:18px;
box-shadow:0 12px 25px rgba(0,0,0,0.15);
text-align:center;
}

.logo{
font-size:24px;
font-weight:700;
color:var(--green);
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

.error{color:red;font-size:14px;margin-top:8px}
.link{margin-top:15px;font-size:14px}
.link a{color:var(--green);text-decoration:none;font-weight:600}
</style>

</head>

<body>

<header>
<h2 onclick="location.href='index.html'" style="cursor:pointer">🌾 FertilizerSeedMart</h2>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
</nav>
</header>

<div class="center">
<div class="card">

<div class="logo">Login</div>

<form onsubmit="loginUser(event)">
<input type="email" id="email" placeholder="Email Address" required>
<input type="password" id="pass" placeholder="Password" required>

<button type="submit">Login</button>

<div class="error" id="error"></div>
</form>

<div class="link">
Don't have an account? <a href="register.html">Register</a>
</div>

</div>
</div>
</body>
</html>
