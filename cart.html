<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FertilizerSeedMart - Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{--green:#2e7d32;--accent:#ffb300;--light:#f4f8f4}
*{box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:var(--light);margin:0}

/* HEADER */
header{background:var(--green);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
header input{padding:8px 14px;border-radius:20px;border:none;width:40%}

/* NAVBAR */

nav{
background:#e8f5e9;
display:flex;
justify-content:center;
gap:30px;
padding:10px;
font-weight:600;
}

nav a{
text-decoration:none;
color:#2e7d32;
padding:6px 12px;
border-radius:6px;
transition:all 0.25s ease;
}

/* HOVER EFFECT */
nav a:hover{
background:#2e7d32;
color:white;
transform:translateY(-2px);
}

/* CART */
.container{max-width:900px;margin:auto;padding:20px}
.item{display:flex;justify-content:space-between;align-items:center;background:white;padding:15px;margin-bottom:12px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.left{display:flex;gap:12px;align-items:center}
.left img{width:70px;height:70px;object-fit:cover;border-radius:10px}

.qty button{padding:4px 10px;border:none;background:#ddd;border-radius:6px;margin:2px}

.remove{background:#ef5350;color:white;border:none;border-radius:18px;padding:6px 12px;margin-top:5px}
.checkout{width:100%;padding:14px;background:var(--accent);border:none;border-radius:28px;font-size:16px;margin-top:15px}
.clear{margin-top:10px;background:#424242;color:white;border:none;padding:10px;border-radius:20px;width:100%}

.total{font-size:18px;font-weight:600;margin-top:15px;background:white;padding:12px;border-radius:12px}
.address{background:white;padding:15px;border-radius:12px;margin-top:18px}
.address input{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc}

.empty{text-align:center;margin-top:40px;color:#777}
</style>

</head>

<body>

<header>
<h2>🛒 Your Cart</h2>
<input placeholder="Search item...">
<div>2 items</div>
</header>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
<a href="profile.html">Profile</a>
</nav>

<div class="container">

<!-- SAMPLE ITEMS -->

<div class="item">
<div class="left">
<img src="https://images.unsplash.com/photo-1506806732259-39c2d0268443">
<div>
<b>Hybrid Corn Seeds</b><br>
₹350 × 1 = <b>₹350</b>
</div>
</div>

<div class="qty">
<button>−</button>
<b>1</b>
<button>+</button><br>
<button class="remove">Remove</button>
</div>
</div>

<div class="item">
<div class="left">
<img src="https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b">
<div>
<b>Wheat Seeds</b><br>
₹280 × 2 = <b>₹560</b>
</div>
</div>

<div class="qty">
<button>−</button>
<b>2</b>
<button>+</button><br>
<button class="remove">Remove</button>
</div>
</div>

<div class="total">
Subtotal: ₹910<br>
Delivery: ₹40<br>
<b>Grand Total: ₹950</b>
</div>

<div class="address">
<b>Delivery Address</b>
<input placeholder="Enter delivery address">
</div>

<button class="checkout">Place Order</button> <button class="clear">Clear Cart</button>

</div>

</body>
</html>
