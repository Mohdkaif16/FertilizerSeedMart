<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FertilizerSeedMart - Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--green:#2e7d32;
--accent:#ffb300;
--light:#f4f8f4;
}

*{box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:var(--light);margin:0}

/* HEADER */
header{
background:var(--green);
color:white;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

header input{
padding:8px 14px;
border-radius:20px;
border:none;
width:260px;
}

/* CART BADGE */
.cart-btn{background:#1b5e20;color:#fff;padding:10px 18px;border-radius:30px;font-weight:600}
.cart{position:fixed;right:-350px;top:0;width:320px;height:100%;background:#fff;box-shadow:-3px 0 15px rgba(0,0,0,.25);padding:20px}


/* NAVBAR */
nav{
background:#e8f5e9;
display:flex;
justify-content:center;
gap:30px;
padding:10px;
font-weight:600;
}

nav a{
text-decoration:none;
color:#2e7d32;
padding:6px 12px;
border-radius:6px;
transition:.25s;
}

nav a:hover{
background:#2e7d32;
color:white;
transform:translateY(-2px);
}

/* SECTION */
.section{width:95%;margin:25px auto}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
}

@media(max-width:1000px){
.grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:520px){
.grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:14px;
text-align:center;
box-shadow:0 3px 12px rgba(0,0,0,.08);
transition:.25s;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 24px rgba(0,0,0,.15);
}

/* IMAGE */
.card-image{
height:210px;
display:flex;
align-items:center;
justify-content:center;
background:#f3f7f3;
border-radius:12px;
overflow:hidden;
padding:10px;
}

.card-image img{
max-width:100%;
max-height:100%;
object-fit:contain;
transition:.35s;
}

.card:hover .card-image img{transform:scale(1.08);}

.card h3{margin:12px 0 5px}
.card p{font-weight:600;color:var(--green);margin:5px 0 10px}

/* BUTTON */
.card button{
background:var(--accent);
border:none;
padding:10px 16px;
border-radius:22px;
cursor:pointer;
font-weight:600;
transition:.25s;
}

.card button:hover{
background:#ffa000;
transform:scale(1.05);
}
</style>
</head>

<body>

<header>
<h2>🌾 FertilizerSeedMart</h2>
<input id="search" placeholder="Search products...">
<div class="cart-btn">🛒 <span>0</span></div>
</header>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
<a href="profile.html">Profile</a>
</nav>

<div class="section">
<h2>Products</h2>

<div class="grid" id="productGrid">

<!-- Wheat -->
<div class="card" data-name="wheat">
<div class="card-image">
<img src="https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b">
</div>
<h3>Wheat Seeds</h3>
<p>₹120</p>
<button onclick="addToCart('Wheat Seeds',120,this)">Add to Cart</button>
</div>

<!-- Rice -->
<div class="card" data-name="rice">
<div class="card-image">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1wa3MGpEmc0LU6Iyn044TgunAUpyiMZePGIXUCn_fnFR4K5k3">
</div>
<h3>Rice Seeds</h3>
<p>₹150</p>
<button onclick="addToCart('Rice Seeds',150,this)">Add to Cart</button>
</div>

<!-- DAP -->
<div class="card" data-name="dap">
<div class="card-image">
<img src="https://m.media-amazon.com/images/I/51oBCUyTOjL._AC_UF1000,1000_QL80_.jpg">
</div>
<h3>DAP Fertilizer</h3>
<p>₹1350</p>
<button onclick="addToCart('DAP Fertilizer',1350,this)">Add to Cart</button>
</div>

<!-- Urea -->
<div class="card" data-name="urea">
<div class="card-image">
<img src="https://m.media-amazon.com/images/I/61INdBPuvpL._AC_UF1000,1000_QL80_.jpg">
</div>
<h3>Urea Fertilizer</h3>
<p>₹300</p>
<button onclick="addToCart('Urea Fertilizer',300,this)">Add to Cart</button>
</div>

</div>
</div>


</body>
</html>
