<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - FertilizerSeedMart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--green:#2e7d32;
--light:#f4f8f4;
--accent:#ffb300;
}

*{box-sizing:border-box;margin:0;font-family:Poppins,sans-serif}
body{background:var(--light)}

header{
background:var(--green);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
flex-wrap:wrap;
gap:10px;
}

/* BRAND LOGO */
.brand{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
}

.brand img{
height:42px;
border-radius:6px;
background:white;
padding:2px;
}
nav{
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
font-weight:500;
}

/* REGISTER CARD */
.center{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.card{
background:white;
width:380px;
padding:30px;
border-radius:18px;
box-shadow:0 12px 25px rgba(0,0,0,0.15);
text-align:center;
}

.logo{
font-size:24px;
font-weight:700;
color:var(--green);
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

.error{color:red;font-size:14px;margin-top:8px}
.success{color:green;font-size:14px;margin-top:8px}

.link{margin-top:15px;font-size:14px}
.link a{color:var(--green);text-decoration:none;font-weight:600}
</style>

</head>

<body>

<header>
<a href="index.html" class="brand">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSB7R-Hvkk2DNO8FEXML4n1gtinFU95JTBSEw&s">
<span>FertilizerSeedMart</span>
</a>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
</nav>
</header>

<div class="center">
<div class="card">

<div class="logo">Create Account</div>

<form onsubmit="registerUser(event)">
<input type="email" id="email" placeholder="Email Address" required>
<input type="password" id="pass" placeholder="Password" required>
<input type="password" id="confirm" placeholder="Confirm Password" required>

<button type="submit">Register</button>

<div class="error" id="error"></div>
<div class="success" id="success"></div>
</form>

<div class="link">
Already have an account? <a href="login.html">Login</a>
</div>
</div>
</div>
</body>
</html>
