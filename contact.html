<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FertilizerSeedMart - Contact</title>

<style>
:root{
--green:#2e7d32;
--darkgreen:#1b5e20;
--light:#f4f8f4;
--accent:#ffb300;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--light);
}

/* HEADER */
header{
background:var(--green);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
flex-wrap:wrap;
gap:10px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
}

.logo img{
height:42px;
border-radius:6px;
}

.search{
padding:9px 14px;
border-radius:20px;
border:none;
width:260px;
max-width:90%;
}

.user-btn{
background:white;
color:var(--green);
padding:7px 14px;
border-radius:20px;
font-weight:bold;
border:none;
cursor:pointer;
}

.cart-btn{
background:var(--darkgreen);
padding:9px 16px;
border-radius:25px;
font-weight:bold;
}

nav{
background:#e8f5e9;
display:flex;
justify-content:center;
gap:30px;
padding:10px;
font-weight:600;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:var(--green);
padding:6px 12px;
border-radius:6px;
transition:.25s;
}

nav a:hover{
background:var(--green);
color:white;
}

/* CONTACT SECTION */
.contact-section{
width:90%;
max-width:400px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.contact-section h2{
text-align:center;
margin-bottom:20px;
color:var(--green);
}

.contact-form{
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
resize:none;
}

.contact-form textarea{
min-height:120px;
}

.submit-btn{
background:var(--accent);
border:none;
padding:12px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#ffa000;
}

/* CONTACT INFO */
.contact-info{
margin-top:30px;
text-align:center;
color:#444;
}

footer{
background:var(--green);
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="logo">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSB7R-Hvkk2DNO8FEXML4n1gtinFU95JTBSEw&s">
FertilizerSeedMart
</a>

<input type="search" class="search" placeholder="Search seeds, fertilizer...">

<div style="display:flex;align-items:center;gap:15px">
<a href="login.html"><button class="user-btn">Login</button></a>
<div class="cart-btn">🛒 0</div>
</div>
</header>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
<a href="profile.html">Profile</a>
<a href="contact.html">Contact</a>
</nav>

<div class="contact-section">
<h2>Contact Us</h2>

<form class="contact-form">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<input type="text" placeholder="Subject">
<textarea placeholder="Your Message" required></textarea>
<button type="submit" class="submit-btn">Send Message</button>
</form>

<div class="contact-info">
<p><strong>Email:</strong> support@fertilizerseedmart.com</p>
<p><strong>Phone:</strong> +91 98765 43210</p>
<p><strong>Address:</strong> Agri Market Road, New Delhi, India</p>
</div>

</div>

<footer>
© 2026 FertilizerSeedMart • Helping Farmers Grow Better 
</footer>

</body>
</html>
