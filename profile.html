<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FertilizerSeedMart - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--green:#2e7d32;
--light:#f4f8f4;
--accent:#ffb300;
}

*{box-sizing:border-box;margin:0;font-family:Poppins,sans-serif}
body{background:var(--light)}

/* HEADER */
/* ===== MODERN HEADER ===== */
header{
background:var(--green);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
flex-wrap:wrap;
gap:10px;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
text-decoration:none;
color:white;
}

.logo img{
height:42px;
border-radius:6px;
}


/* SEARCH */
.search-box{
flex:1;
text-align:center;
}

.search-box input{
width:60%;
max-width:420px;
min-width:180px;
padding:9px 14px;
border-radius:25px;
border:none;
outline:none;
}

/* RIGHT SIDE */
.header-right{
display:flex;
align-items:center;
gap:15px;
}

/* LOGIN BUTTON */
.login-btn{
background:white;
color:#2e7d32;
padding:7px 14px;
border-radius:20px;
text-decoration:none;
font-weight:600;
transition:.25s;
}

.login-btn:hover{
background:#c8e6c9;
}

/* CART */
.cart-icon{
text-decoration:none;
color:white;
font-size:18px;
font-weight:600;
padding:6px 10px;
border-radius:18px;
transition:.25s;
}

.cart-icon:hover{
background:rgba(255,255,255,0.15);
}

/* MOBILE */
@media(max-width:700px){
.search-box{
width:100%;
margin-top:10px;
order:3;
}

.search-box input{
width:95%;
}
}

/* NAV */
nav{
background:#e8f5e9;
display:flex;
justify-content:center;
gap:30px;
padding:10px;
font-weight:600;
}

nav a{
text-decoration:none;
color:#2e7d32;
padding:6px 12px;
border-radius:6px;
transition:all 0.25s ease;
}

/* HOVER EFFECT */
nav a:hover{
background:#2e7d32;
color:white;
transform:translateY(-2px);
}

/* PROFILE CARD */
.container{max-width:400px;margin:40px auto}
.card{
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.profile-head{text-align:center;margin-bottom:15px}
.avatar{
width:90px;height:90px;
margin:auto;
border-radius:50%;
background:#c8e6c9;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:700;
color:var(--green);
}

label{display:block;margin-top:12px;color:#555;font-size:14px}

input{
width:100%;
padding:11px;
margin-top:6px;
border-radius:10px;
border:1px solid #ccc;
}

.btn{
width:100%;
margin-top:18px;
padding:12px;
border:none;
border-radius:25px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

.success{text-align:center;margin-top:10px;font-size:14px}
.info{background:#f1f8e9;padding:12px;border-radius:10px;margin-top:15px;font-size:14px}
</style>

</head>

<body>

<header class="header">

<a href="index.html" class="logo">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSB7R-Hvkk2DNO8FEXML4n1gtinFU95JTBSEw&s" alt="logo">
FertilizerSeedMart
</a>

<div class="search-box">
<input type="text" placeholder="Search seeds, fertilizer...">
</div>

<div class="header-right">
<a href="login.html" class="login-btn">Login</a>
<a href="cart.html" class="cart-icon">🛒 <span>0</span></a>
</div>

</header>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
<a href="profile.html">Profile</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">
<div class="card">

<div class="profile-head">
<div class="avatar">U</div>
<h3>User</h3>
</div>

<form>
<label>Name</label>
<input placeholder="Enter your name">

<label>Village</label> <input placeholder="Enter your village">

<label>Phone</label> <input placeholder="10 digit mobile number">

<button class="btn">Save Profile</button>

</form>

<div class="success"></div>

<div class="info">
Your details help sellers contact you for delivery and support.
</div>

</div>
</div>

</body>
</html>
